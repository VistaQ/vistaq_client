        name:
          type: string
          example: Alpha Team
        status:
          type: string
          example: active
        leader_id:
          type: string
          format: uuid
          nullable: true
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        created_at:
          type: string
          format: date-time
          example: "2026-03-10T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-10T08:00:00.000Z"

    GroupStatsObject:
      type: object
      required:
        - group_id
        - group_name
        - ytd_prospects
        - ytd_appointments_set
        - ytd_sales_meetings
        - ytd_sales_noc
        - ytd_sales_ace
        - ytd_agents_count
      properties:
        group_id:
          type: string
          format: uuid
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        group_name:
          type: string
          example: Alpha Team
        ytd_prospects:
          type: integer
          description: Total prospects created for the group year-to-date.
          example: 45
        ytd_appointments_set:
          type: integer
          description: >
            Prospects whose appointment status is `scheduled` or `rescheduled`
            for the group year-to-date.
          example: 30
        ytd_sales_meetings:
          type: integer
          description: Prospects whose appointment status is `done` for the group year-to-date.
          example: 20
        ytd_sales_noc:
          type: integer
          description: Total number of successful sales (NOC) for the group year-to-date.
          example: 12
        ytd_sales_ace:
          type: number
          description: Total sum of products sold amounts (ACE) for the group year-to-date.
          example: 180000
        ytd_agents_count:
          type: integer
          description: Current total count of agents belonging to the group.
          example: 8

    GroupDetailStatsObject:
      type: object
      required:
        - group_id
        - group_name
        - ytd
        - mtd
        - agents
      properties:
        group_id:
          type: string
          format: uuid
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        group_name:
          type: string
          example: Alpha Team
        ytd:
          $ref: "#/components/schemas/DashboardStatsPeriod"
        mtd:
          $ref: "#/components/schemas/GroupDetailStatsMtdPeriod"
        agents:
          type: array
          description: List of individual agent statistics for the group.
          items:
            $ref: "#/components/schemas/AgentStats"

    GroupDetailStatsMtdPeriod:
      type: object
      description: >
        Aggregated statistics for the month-to-date period scoped to a specific
        group. Excludes `agents_count` — agent count is a current point-in-time
        figure and is only present in the `ytd` object.
      required:
        - prospects
        - appointments_set
        - sales_meetings
        - sales_noc
        - sales_ace
      properties:
        prospects:
          type: integer
          description: Total prospects created in the period.
          example: 8
        appointments_set:
          type: integer
          description: >
            Prospects whose appointment status is `scheduled` or `rescheduled`
            in the period.
          example: 5
        sales_meetings:
          type: integer
          description: Prospects whose appointment status is `done` in the period.
          example: 4
        sales_noc:
          type: integer
          description: Prospects with a successful sales outcome in the period.
          example: 2
        sales_ace:
          type: number
          description: >
            Total sum of products sold amounts for successful sales in the
            period.
          example: 30000

    AgentStats:
      type: object
      description: >
        YTD and MTD statistics for an individual agent within a group.
      required:
        - agent_id
        - agent_name
        - ytd_prospects
        - ytd_appointments_set
        - ytd_sales_meetings
        - ytd_sales_noc
        - ytd_sales_ace
        - mtd_prospects
        - mtd_appointments_set
        - mtd_sales_meetings
        - mtd_sales_noc
        - mtd_sales_ace
      properties:
        agent_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        agent_name:
          type: string
          example: John Doe
        ytd_prospects:
          type: integer
          description: Total prospects created by the agent year-to-date.
          example: 15
        ytd_appointments_set:
          type: integer
          description: >
            Prospects whose appointment status is `scheduled` or `rescheduled`
            for the agent year-to-date.
          example: 10
        ytd_sales_meetings:
          type: integer
          description: Prospects whose appointment status is `done` for the agent year-to-date.
          example: 7
        ytd_sales_noc:
          type: integer
          description: Prospects with a successful sales outcome for the agent year-to-date.
          example: 4
        ytd_sales_ace:
          type: number
          description: Total sum of products sold amounts for the agent year-to-date.
          example: 60000
        mtd_prospects:
          type: integer
          description: Total prospects created by the agent month-to-date.
          example: 2
        mtd_appointments_set:
          type: integer
          description: >
            Prospects whose appointment status is `scheduled` or `rescheduled`
            for the agent month-to-date.
          example: 1
        mtd_sales_meetings:
          type: integer
          description: Prospects whose appointment status is `done` for the agent month-to-date.
          example: 1
        mtd_sales_noc:
          type: integer
          description: Prospects with a successful sales outcome for the agent month-to-date.
          example: 1
        mtd_sales_ace:
          type: number
          description: Total sum of products sold amounts for the agent month-to-date.
          example: 10000

    ProspectObject:
      type: object
      required:
        - id
        - tenant_id
        - agent_id
        - prospect_name
        - prospect_email
        - prospect_phone
        - current_stage
        - prospect_entered_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        agent_id:
          type: string
          format: uuid
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        prospect_name:
          type: string
          example: Alice Johnson
        prospect_email:
          type: string
          format: email
          nullable: true
          example: alice.johnson@example.com
        prospect_phone:
          type: string
          nullable: true
          example: "+6591234567"
        current_stage:
          type: string
          enum: [prospect, appointment, sales]
          example: prospect
        stage_history:
          type: array
          items:
            type: object
          description: Ordered list of stage transition records for this prospect.
          example: []
        prospect_entered_at:
          type: string
          format: date-time
          example: "2026-03-12T08:00:00.000Z"
        appointment_date:
          type: string
          format: date
          nullable: true
          example: "2026-04-01"
        appointment_start_time:
          type: string
          nullable: true
          example: "14:00"
        appointment_end_time:
          type: string
          nullable: true
          example: "15:00"
        appointment_location:
          type: string
          nullable: true
          example: Raffles Place Office
        appointment_status:
          type: string
          enum: [not_done, scheduled, rescheduled, kiv, done, declined]
          nullable: true
          example: scheduled
        appointment_completed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-01T15:00:00.000Z"
        sales_parts_completed:
          type: array
          items:
            type: string
            enum: [social, factFind, presentation]
          nullable: true
          description: Sales meeting stages completed during the sales meeting.
          example: [social, factFind]
        products_sold:
          type: array
          nullable: true
          items:
            type: object
            required: [productName, amount]
            properties:
              productName:
                type: string
                example: Term Life Insurance
              amount:
                type: number
                example: 50000
          description: Products sold to the prospect.
          example:
            - productName: Term Life Insurance
              amount: 50000
        sales_outcome:
          type: string
          enum: [kiv, successful, unsuccessful]
          nullable: true
          example: successful
        unsuccessful_reason:
          type: string
          nullable: true
          example: Client budget constraints
        sales_completed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-10T10:00:00.000Z"
        created_at:
          type: string
          format: date-time
          example: "2026-03-12T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-12T08:00:00.000Z"

    EventObject:
      type: object
      required:
        - id
        - tenant_id
        - event_title
        - start_date
        - status
        - type
        - created_at
        - updated_at
        - groupIds
        - agentIds
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        event_title:
          type: string
          example: Q2 Training Kickoff
        start_date:
          type: string
          format: date-time
          description: >
            Start date and time of the event stored as a TIMESTAMPTZ value.
            Formed by combining the `date` and `startTime` fields supplied on
            create/update into a single ISO 8601 timestamp.
          example: "2026-04-15T09:00:00.000Z"
        end_date:
          type: string
          format: date-time
          nullable: true
          description: >
            End date and time of the event stored as a TIMESTAMPTZ value.
            Formed by combining the `date` and `endTime` fields supplied on
            create/update into a single ISO 8601 timestamp.
          example: "2026-04-15T11:00:00.000Z"
        status:
          type: string
          enum: [upcoming, completed, cancelled]
          description: Current status of the event. Defaults to `upcoming` on creation.
          example: upcoming
        type:
          type: string
          enum: ["Face to Face", "Online"]
          description: Delivery format of the event.
          example: "Face to Face"
        description:
          type: string
          nullable: true
          example: Quarterly training kickoff covering Q2 targets and new product modules.
        meeting_link:
          type: string
          nullable: true
          example: "https://meet.example.com/q2-kickoff"
        venue:
          type: string
          nullable: true
          example: Raffles Place Conference Room
        created_by:
          type: string
          format: uuid
          nullable: true
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        created_by_role:
          type: string
          nullable: true
          example: trainer
        created_at:
          type: string
          format: date-time
          example: "2026-03-14T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-14T08:00:00.000Z"
        groupIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of groups assigned to this event
          example:
            - a1b2c3d4-e5f6-7890-abcd-ef1234567890
            - c3d4e5f6-a7b8-9012-cdef-123456789012
        agentIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of agents individually assigned to this event
          example:
            - d4e5f6a7-b8c9-0123-def0-234567890123
            - e5f6a7b8-c9d0-1234-ef01-345678901234

    DashboardStatsObject:
      type: object
      required: [ytd, mtd]
      properties:
        ytd:
          $ref: "#/components/schemas/DashboardStatsPeriod"
        mtd:
          $ref: "#/components/schemas/DashboardStatsPeriod"

    DashboardStatsPeriod:
      type: object
      description: >
        Aggregated statistics for a single time period (YTD or MTD).
        `agents_count` reflects the current total count of users with the
        `agent` or `group_leader` role and is identical in both periods.
      required:
        - prospects
        - appointments_set
        - sales_meetings
        - sales_noc
        - sales_ace
        - agents_count
      properties:
        prospects:
          type: integer
          description: Total prospects created in the period.
          example: 120
        appointments_set:
          type: integer
          description: >
            Prospects whose appointment status is `scheduled` or `rescheduled`
            in the period.
          example: 85
        sales_meetings:
          type: integer
          description: >
            Prospects whose appointment status is `done` in the period.
          example: 60
        sales_noc:
          type: integer
          description: Prospects with a successful sales outcome in the period.
          example: 30
        sales_ace:
          type: number
          description: >
            Total sum of products sold amounts for successful sales in the
            period.
          example: 450000
        agents_count:
          type: integer
          description: >
            Current total count of users with the `agent` or `group_leader`
            role. This value is the same for both YTD and MTD periods.
          example: 24

    PointConfigObject:
      type: object
      required:
        - id
        - activity
        - points
        - tenant_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        activity:
          type: string
          enum:
            - prospect_created
            - appointment_set
            - sales_meeting
            - sale_closed
          example: prospect_created
        points:
          type: integer
          example: 10
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        created_at:
          type: string
          format: date-time
          example: "2026-03-29T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-29T08:00:00.000Z"

    LeaderboardEntryObject:
      type: object
      required:
        - agent_id
        - agent_name
        - agent_code
        - group_id
        - group_name
        - total_points
      properties:
        agent_id:
          type: string
          format: uuid
          example: d4e5f6a7-b8c9-0123-def0-234567890123
        agent_name:
          type: string
          example: John Doe
        agent_code:
          type: string
          example: AGT001
        group_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the group the agent belongs to. Null if not in a group.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        group_name:
          type: string
          nullable: true
          description: Name of the group the agent belongs to. Null if not in a group.
          example: Alpha Team
        total_points:
          type: integer
          description: Cumulative points earned by the agent.
          example: 150

    LeaderboardStatsIndividualObject:
      type: object
      required:
        - user_id
        - name
        - agent_code
        - group_id
        - group_name
        - prospects_added
        - appointments_completed
        - sales_meetings
        - sales_successful
      properties:
        user_id:
          type: string
          format: uuid
          example: d4e5f6a7-b8c9-0123-def0-234567890123
        name:
          type: string
          example: Jane Doe
        agent_code:
          type: string
          example: AGT-001
        group_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the group the agent belongs to. Null if the agent is not in a group.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        group_name:
          type: string
          nullable: true
          description: Name of the group the agent belongs to. Null if the agent is not in a group.
          example: Team Alpha
        prospects_added:
          type: integer
          description: Number of prospects added in the period.
          example: 8
        appointments_completed:
          type: integer
          description: Number of appointments completed in the period.
          example: 5
        sales_meetings:
          type: integer
          description: Number of sales meetings held in the period.
          example: 4
        sales_successful:
          type: integer
          description: Number of successful sales closed in the period.
          example: 2

    LeaderboardStatsGroupObject:
      type: object
      required:
        - group_id
        - group_name
        - leader_name
        - member_count
        - prospects_added
        - appointments_completed
        - sales_meetings
        - sales_successful
      properties:
        group_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        group_name:
          type: string
          example: Team Alpha
        leader_name:
          type: string
          nullable: true
          description: Name of the group leader. Null if no leader is assigned.
          example: John Leader
        member_count:
          type: integer
          description: Number of members in the group.
          example: 5
        prospects_added:
          type: integer
          description: Aggregated number of prospects added by all group members in the period.
          example: 32
        appointments_completed:
          type: integer
          description: Aggregated number of appointments completed by all group members in the period.
          example: 21
        sales_meetings:
          type: integer
          description: Aggregated number of sales meetings held by all group members in the period.
          example: 15
        sales_successful:
          type: integer
          description: Aggregated number of successful sales closed by all group members in the period.
          example: 8

    AgentPointsObject:
      type: object
      required: [total, categories, breakdown, pagination]
      properties:
        total:
          type: integer
          description: Total points accumulated by the agent across all categories.
          example: 142
        categories:
          type: object
          description: Points breakdown by category.
          required: [prospect, sales, coaching]
          properties:
            prospect:
              type: integer
              example: 142
            sales:
              type: integer
              example: 0
            coaching:
              type: integer
              example: 0
        breakdown:
          type: array
          description: Paginated list of individual point transactions.
          items:
            $ref: "#/components/schemas/AgentPointsBreakdownItem"
        pagination:
          $ref: "#/components/schemas/PaginationObject"

    AgentPointsBreakdownItem:
      type: object
      required: [id, date, category, action, subject, points]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the point transaction.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        date:
          type: string
          format: date-time
          description: Timestamp at which the points were awarded.
          example: "2026-03-30T10:00:00.000Z"
        category:
          type: string
          description: Category the points belong to.
          example: prospect
        action:
          type: string
          description: Human-readable label for the action that triggered the award.
          example: Appointment Completed
        subject:
          type: string
          description: Name of the subject (e.g. prospect) associated with the action.
          example: John Tan
        points:
          type: integer
          description: Number of points awarded for this transaction.
          example: 3

    PaginationObject:
      type: object
      required: [page, limit, total_count, total_pages]
      properties:
        page:
          type: integer
          description: Current page number.
          example: 1
        limit:
          type: integer
          description: Number of items per page.
          example: 20
        total_count:
          type: integer
          description: Total number of items across all pages.
          example: 47
        total_pages:
          type: integer
          description: Total number of pages.
          example: 3

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Server Error

    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
          example: []
