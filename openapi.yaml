          example: 142
        categories:
          type: object
          description: Points breakdown by category.
          required: [prospect, sales, coaching]
          properties:
            prospect:
              type: integer
              example: 142
            sales:
              type: integer
              example: 0
            coaching:
              type: integer
              example: 0
        breakdown:
          type: array
          description: Paginated list of individual point transactions.
          items:
            $ref: "#/components/schemas/AgentPointsBreakdownItem"
        pagination:
          $ref: "#/components/schemas/PaginationObject"

    AgentPointsBreakdownItem:
      type: object
      required: [id, date, category, action, points]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the point transaction.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        date:
          type: string
          format: date-time
          description: Timestamp at which the points were awarded.
          example: "2026-03-30T10:00:00.000Z"
        category:
          type: string
          description: Category the points belong to.
          example: prospect
        action:
          type: string
          description: Human-readable label for the action that triggered the award.
          example: Appointment Set
        subject:
          type: string
          nullable: true
          description: >
            Name of the subject (e.g. prospect) associated with the action.
            Null when the underlying subject has been deleted — e.g. a
            `prospect_deleted` compensation row references a prospect that
            no longer exists. Frontends should fall back to the action label.
          example: John Tan
        points:
          type: integer
          description: Number of points awarded for this transaction.
          example: 3

