    EventObject:
      type: object
      required:
        - id
        - tenant_id
        - event_title
        - start_date
        - status
        - type
        - created_at
        - updated_at
        - groupIds
        - agentIds
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        event_title:
          type: string
          example: Q2 Training Kickoff
        start_date:
          type: string
          format: date-time
          description: >
            Start date and time of the event stored as a TIMESTAMPTZ value.
            Value of the `startDate` field supplied in the request.
          example: "2026-04-15T09:00:00.000Z"
        end_date:
          type: string
          format: date-time
          nullable: true
          description: >
            End date and time of the event stored as a TIMESTAMPTZ value.
            Value of the `endDate` field supplied in the request.
          example: "2026-04-15T11:00:00.000Z"
        status:
          type: string
          enum: [upcoming, completed, cancelled]
          description: Current status of the event. Defaults to `upcoming` on creation.
          example: upcoming
        type:
          type: string
          enum: ["Face to Face", "Online"]
          description: Delivery format of the event.
          example: "Face to Face"
        description:
          type: string
          nullable: true
          example: Quarterly training kickoff covering Q2 targets and new product modules.
        meeting_link:
          type: string
          nullable: true
          example: "https://meet.example.com/q2-kickoff"
        venue:
          type: string
          nullable: true
          example: Raffles Place Conference Room
        created_by:
          type: string
          format: uuid
          nullable: true
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        created_by_role:
          type: string
          nullable: true
          example: trainer
        created_at:
          type: string
          format: date-time
          example: "2026-03-14T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-14T08:00:00.000Z"
        groupIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of groups assigned to this event
          example:
            - a1b2c3d4-e5f6-7890-abcd-ef1234567890
            - c3d4e5f6-a7b8-9012-cdef-123456789012
        agentIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of agents individually assigned to this event
          example:
            - d4e5f6a7-b8c9-0123-def0-234567890123
            - e5f6a7b8-c9d0-1234-ef01-345678901234

    DashboardStatsObject:
      type: object
      required: [ytd, mtd]
      properties:
        ytd:
          $ref: "#/components/schemas/DashboardStatsPeriod"
        mtd:
          $ref: "#/components/schemas/DashboardStatsPeriod"

    DashboardStatsPeriod:
      type: object
      description: >
        Aggregated statistics for a single time period (YTD or MTD).
        `agents_count` reflects the current total count of users with the
        `agent` or `group_leader` role and is identical in both periods.
      required:
        - prospects
        - appointments_set
        - sales_meetings
        - sales_noc
        - sales_ace
        - agents_count
      properties:
        prospects:
          type: integer
          description: Total prospects created in the period.
          example: 120
        appointments_set:
          type: integer
          description: >
            Prospects whose appointment status is `scheduled` or `rescheduled`
            in the period.
          example: 85
        sales_meetings:
          type: integer
          description: >
            Prospects whose appointment status is `done` in the period.
          example: 60
        sales_noc:
          type: integer
          description: Prospects with a successful sales outcome in the period.
          example: 30
        sales_ace:
          type: number
          description: >
            Total sum of products sold amounts for successful sales in the
            period.
          example: 450000
        agents_count:
          type: integer
          description: >
            Current total count of users with the `agent` or `group_leader`
            role. This value is the same for both YTD and MTD periods.
          example: 24

