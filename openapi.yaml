            type: string
            format: uuid
            example: b2c3d4e5-f6a7-8901-bcde-f12345678901
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title:
                  type: string
                  minLength: 1
                  description: Updated title of the event.
                  example: Q2 Training Kickoff (Revised)
                date:
                  type: string
                  format: date
                  description: >
                    Updated date of the event in YYYY-MM-DD format. Cannot be a
                    past date.
                  example: "2026-04-20"
                time:
                  type: string
                  description: Updated time of the event in HH:MM 24-hour format.
                  example: "10:00"
                link:
                  type: string
                  format: uri
                  description: Updated URL for the event.
                  example: "https://meet.example.com/q2-kickoff-revised"
                venue:
                  type: string
                  description: Updated venue or location for the event.
                  example: Marina Bay Conference Centre
                description:
                  type: string
                  minLength: 1
                  description: Updated description or agenda for the event.
                  example: Updated agenda covering revised Q2 targets.
                groupIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                  description: >
                    Replacement set of group UUIDs for the event. Existing
                    `event_groups` entries are deleted and replaced with these
                    values. For trainers, all IDs must be groups they manage.
                  example:
                    - 7c9e6679-7425-40de-944b-e07fc1f90ae7
      responses:
        "200":
          description: Event updated successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/EventObject"
        "400":
          description: >
            Bad request. Returned when the request body fails validation (e.g.
            no fields provided, `date` is in the past, a supplied group UUID
            does not exist, or a trainer supplies a group they do not manage).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
              examples:
                validationFailure:
                  summary: Request body validation failure
                  value:
                    message: Validation failed
                    errors:
                      - code: custom
                        message: At least one field must be provided
                        path: []
                invalidGroupIds:
                  summary: One or more group IDs do not exist
                  value:
                    message: One or more group IDs are invalid
                trainerUnmanagedGroups:
                  summary: Trainer supplied groups they do not manage
                  value:
                    message: Trainer does not manage one or more of the supplied groups
        "401":
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Unauthorized
        "403":
          description: >
            Forbidden. Returned when the authenticated user has the `agent`
            role, which is not permitted to update events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Forbidden
        "404":
          description: Not found. Returned when no event exists for the given `eventId`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Event not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

################################################################################
# Components
################################################################################

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserObject:
      type: object
      required:
        - id
        - tenant_id
        - email
        - name
        - role
        - agent_code
        - location
        - group_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        email:
          type: string
          format: email
          example: jane.smith@example.com
        name:
          type: string
          example: Jane Smith
        role:
          type: string
          enum: [admin, master_trainer, trainer, group_leader, agent]
          example: agent
        agent_code:
          type: string
          example: AGT-00123
        location:
          type: string
          example: Singapore
        group_id:
          type: string
          format: uuid
          nullable: true
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        status:
          type: string
          enum: [active, inactive, suspended]
          example: active
        created_at:
          type: string
          format: date-time
          example: "2026-03-07T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-07T08:00:00.000Z"

    GroupObject:
      type: object
      required:
        - id
        - tenant_id
        - name
        - status
        - leader_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          example: Alpha Team
        status:
          type: string
          example: active
        leader_id:
          type: string
          format: uuid
          nullable: true
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        created_at:
          type: string
          format: date-time
          example: "2026-03-10T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-10T08:00:00.000Z"

    ProspectObject:
      type: object
      required:
        - id
        - tenant_id
        - agent_id
        - group_id
        - prospect_name
        - prospect_email
        - prospect_phone
        - current_stage
        - prospect_entered_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        agent_id:
          type: string
          format: uuid
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        group_id:
          type: string
          format: uuid
          nullable: true
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        prospect_name:
          type: string
          example: Alice Johnson
        prospect_email:
          type: string
          format: email
          nullable: true
          example: alice.johnson@example.com
        prospect_phone:
          type: string
          nullable: true
          example: "+6591234567"
        current_stage:
          type: string
          enum: [prospect, appointment, sales]
          example: prospect
        stage_history:
          type: array
          items:
            type: object
          description: Ordered list of stage transition records for this prospect.
          example: []
        prospect_entered_at:
          type: string
          format: date-time
          example: "2026-03-12T08:00:00.000Z"
        appointment_date:
          type: string
          format: date
          nullable: true
          example: "2026-04-01"
        appointment_start_time:
          type: string
          nullable: true
          example: "14:00"
        appointment_end_time:
          type: string
          nullable: true
          example: "15:00"
        appointment_location:
          type: string
          nullable: true
          example: Raffles Place Office
        appointment_status:
          type: string
          enum: [not_done, scheduled, rescheduled, kiv, done, declined]
          nullable: true
          example: scheduled
        appointment_completed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-01T15:00:00.000Z"
        sales_parts_completed:
          type: array
          items:
            type: string
            enum: [social, factFind, presentation]
          nullable: true
          description: Sales meeting stages completed during the sales meeting.
          example: [social, factFind]
        products_sold:
          type: array
          nullable: true
          items:
            type: object
            required: [productName, amount]
            properties:
              productName:
                type: string
                example: Term Life Insurance
              amount:
                type: number
                example: 50000
          description: Products sold to the prospect.
          example:
            - productName: Term Life Insurance
              amount: 50000
        sales_outcome:
          type: string
          enum: [kiv, successful, unsuccessful]
          nullable: true
          example: successful
        unsuccessful_reason:
          type: string
          nullable: true
          example: Client budget constraints
        sales_completed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-10T10:00:00.000Z"
        created_at:
          type: string
          format: date-time
          example: "2026-03-12T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-12T08:00:00.000Z"

    EventObject:
      type: object
      required:
        - id
        - tenant_id
        - event_title
        - date
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        event_title:
          type: string
          example: Q2 Training Kickoff
        date:
          type: string
          format: date-time
          description: >
            Date (and optional time) of the event stored as a TIMESTAMPTZ value.
            When a `time` is supplied on create/update it is combined with the
            `date` into a single ISO 8601 timestamp.
          example: "2026-04-15T09:00:00.000Z"
        description:
          type: string
          nullable: true
          example: Quarterly training kickoff covering Q2 targets and new product modules.
        meeting_link:
          type: string
          nullable: true
          example: "https://meet.example.com/q2-kickoff"
        venue:
          type: string
          nullable: true
          example: Raffles Place Conference Room
        created_by:
          type: string
          format: uuid
          nullable: true
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        created_by_role:
          type: string
          nullable: true
          example: trainer
        created_at:
          type: string
          format: date-time
          example: "2026-03-14T08:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-14T08:00:00.000Z"

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Server Error

    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
          example: []
